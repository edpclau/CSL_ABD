[workspace]
name = "dag-parameterization"
version = "0.1.0"
description = "DAG Parameterization notebook environment: pgmpy Bayesian network fitting + XGBoost + SHAP"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = ">=3.12,<3.13"
numpy = "*"
pandas = "*"
matplotlib = "*"
networkx = "*"
scikit-learn = "*"
pyarrow = "*"
xgboost = ">=3"
shap = "*"
pgmpy = ">=1.0"
jupyterlab = "*"
ipykernel = "*"
optuna = "*"
pytest = "*"

[pypi-dependencies]
pycalib = ">=0.1.0.dev6,<0.2"
MLstatkit = ">=0.1.91,<0.2"

[tasks]
lab = "jupyter lab"
